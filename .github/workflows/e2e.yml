name: e2e

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  e2e:
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate Mattin secrets
        run: |
          if [ -z "${{ secrets.MATTIN_API_URL }}" ] || [ -z "${{ secrets.MATTIN_API_KEY }}" ] || [ -z "${{ secrets.MATTIN_APP_ID }}" ]; then
            echo "Missing required secrets: MATTIN_API_URL, MATTIN_API_KEY, MATTIN_APP_ID"
            exit 1
          fi

      - name: Write backend env
        run: |
          cp backend/.env.example backend/.env
          {
            echo "MATTIN_API_URL=${{ secrets.MATTIN_API_URL }}"
            echo "MATTIN_API_KEY=${{ secrets.MATTIN_API_KEY }}"
            echo "MATTIN_APP_ID=${{ secrets.MATTIN_APP_ID }}"
            echo "MATTIN_BLOCK_CHAT_AGENT_ID=${{ secrets.MATTIN_BLOCK_CHAT_AGENT_ID }}"
            echo "MATTIN_BLOCK_IMPACT_AGENT_ID=${{ secrets.MATTIN_BLOCK_IMPACT_AGENT_ID }}"
            echo "MATTIN_BLOCK_RELATIONSHIP_AGENT_ID=${{ secrets.MATTIN_BLOCK_RELATIONSHIP_AGENT_ID }}"
            echo "MATTIN_DOCUMENT_WRITER_AGENT_ID=${{ secrets.MATTIN_DOCUMENT_WRITER_AGENT_ID }}"
            echo "MATTIN_DOCUMENT_SPLITTER_AGENT_ID=${{ secrets.MATTIN_DOCUMENT_SPLITTER_AGENT_ID }}"
            echo "MATTIN_BLOCK_REWRITE_AGENT_ID=${{ secrets.MATTIN_BLOCK_REWRITE_AGENT_ID }}"
            echo "MATTIN_DOCUMENT_WIDE_AGENT_ID=${{ secrets.MATTIN_DOCUMENT_WIDE_AGENT_ID }}"
          } >> backend/.env

      - name: Start stack
        run: docker compose up -d --build db backend

      - name: Run database migrations
        run: docker compose exec -T backend python -m alembic upgrade head

      - name: Install frontend deps in container
        run: docker compose run --rm frontend npm ci

      - name: Start frontend
        run: docker compose up -d frontend

      - name: Wait for backend
        run: |
          for i in {1..60}; do
            if curl -fsS http://localhost:8010/health > /dev/null; then
              break
            fi
            sleep 5
          done
          curl -fsS http://localhost:8010/health

      - name: Wait for frontend
        run: |
          for i in {1..60}; do
            if curl -fsS http://localhost:5173 > /dev/null; then
              break
            fi
            sleep 5
          done
          curl -fsS http://localhost:5173 > /dev/null

      - name: Install frontend dependencies
        run: npm --prefix frontend install

      - name: Install Playwright browsers
        run: npx --prefix frontend playwright install --with-deps

      - name: Run Playwright tests
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:5173
        run: npm --prefix frontend run test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report
